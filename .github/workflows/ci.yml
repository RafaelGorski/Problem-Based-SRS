name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build & validate plugin
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate plugin manifest and skills
        run: python scripts/build-plugin.py validate

      - name: Package distributable plugin
        id: package
        run: python scripts/build-plugin.py package

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: plugin-package
          path: dist/*.zip
          if-no-files-found: error
