name: Create Release

# Build & release pipeline: validates the plugin, packages a distributable
# artifact, and publishes a GitHub Release with the artifact attached.
#
# Two ways to release:
#   1. Push a tag matching v*  (e.g. `git tag v1.3 && git push origin v1.3`)
#      -> version is derived from the tag, notes from CHANGELOG.md.
#   2. Run manually (workflow_dispatch). All inputs are optional:
#        - version: defaults to the version in .claude-plugin/plugin.json
#        - release_name: optional display suffix
#        - release_body: optional override; defaults to the CHANGELOG.md section
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, e.g. 1.3 (defaults to plugin.json)"
        required: false
        type: string
      release_name:
        description: "Release name suffix, e.g. Enhanced Traceability"
        required: false
        type: string
      release_body:
        description: "Release notes override (defaults to CHANGELOG.md section)"
        required: false
        type: string

permissions:
  contents: write

jobs:
  release:
    name: Build, package & publish release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Resolve raw version
        id: raw
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            VERSION="${GITHUB_REF_NAME#v}"
          elif [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="$(python -c "import json;print(json.load(open('.claude-plugin/plugin.json'))['version'])")"
          fi
          echo "version=${VERSION#v}" >> "$GITHUB_OUTPUT"

      - name: Build, validate & package
        id: build
        run: python scripts/build-plugin.py build --version "${{ steps.raw.outputs.version }}"

      - name: Determine release notes
        id: notes
        run: |
          if [ -n "${{ inputs.release_body }}" ]; then
            {
              echo "body<<EOF_NOTES"
              cat <<'USER_NOTES'
          ${{ inputs.release_body }}
          USER_NOTES
              echo "EOF_NOTES"
            } >> "$GITHUB_OUTPUT"
          else
            {
              echo "body<<EOF_NOTES"
              GITHUB_OUTPUT="" python scripts/build-plugin.py notes --version "${{ steps.build.outputs.version }}"
              echo "EOF_NOTES"
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.build.outputs.version }}
          RELEASE_NAME: ${{ inputs.release_name }}
          NOTES: ${{ steps.notes.outputs.body }}
          ARTIFACT: ${{ steps.build.outputs.artifact }}
        run: |
          TAG="v${VERSION}"
          if [ -n "$RELEASE_NAME" ]; then
            TITLE="🎉 Version ${VERSION} - ${RELEASE_NAME}"
          else
            TITLE="🎉 Version ${VERSION}"
          fi
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG exists; updating notes and assets."
            printf '%s' "$NOTES" | gh release edit "$TAG" --title "$TITLE" --notes-file -
            gh release upload "$TAG" "$ARTIFACT" --clobber
          else
            printf '%s' "$NOTES" | gh release create "$TAG" \
              --target "${{ github.sha }}" \
              --title "$TITLE" \
              --notes-file - \
              "$ARTIFACT"
          fi
          echo "Published $TAG with asset: $ARTIFACT"
