    <path class="link l1" pathLength="1" d="M180 398 C276.25 398, 258.75 398, 355 398"/>
    <path class="link l2" pathLength="1" d="M415 208 C515.65 208, 497.35 150, 598 150"/>
    <path class="link l2" pathLength="1" d="M415 208 C515.65 208, 497.35 262, 598 262"/>
    <path class="link l2" pathLength="1" d="M415 398 C515.65 398, 497.35 398, 598 398"/>
  </g>

