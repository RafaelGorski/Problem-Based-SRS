  <line x1="20" y1="58" x2="740" y2="58" stroke="oklch(0.900 0.006 240)"/>

  <!-- file chip -->
  <rect x="26" y="72" width="150" height="28" rx="8" fill="oklch(0.965 0.004 240)" stroke="oklch(0.900 0.006 240)"/>
  <text class="chip-txt" x="42" y="87">CRM System</text>
  <rect x="126" y="79" width="42" height="15" rx="7.5" fill="oklch(0.61 0.18 48 / 0.16)"/>
  <text class="badge-txt" x="147" y="87.5" fill="oklch(0.48 0.16 48)">DEMO</text>

  <!-- legend -->
  <circle cx="470" cy="86" r="6" fill="oklch(0.61 0.18 48)"/><text class="legend" x="482" y="90">Problem</text>
  <circle cx="560" cy="86" r="6" fill="oklch(0.58 0.10 202)"/><text class="legend" x="572" y="90">Need</text>
  <circle cx="632" cy="86" r="6" fill="oklch(0.56 0.16 266)"/><text class="legend" x="644" y="90">FR</text>
  <circle cx="686" cy="86" r="6" fill="oklch(0.54 0.15 320)"/><text class="legend" x="698" y="90">NFR</text>

  <line x1="0" y1="106" x2="760" y2="106" stroke="oklch(0.900 0.006 240)"/>

