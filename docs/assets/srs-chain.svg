    <rect x="26" y="300" width="30" height="90" rx="9" fill="oklch(1 0 0)" stroke="oklch(0.900 0.006 240)"/>
    <line x1="30" y1="330" x2="52" y2="330" stroke="oklch(0.900 0.006 240)"/>
    <line x1="30" y1="360" x2="52" y2="360" stroke="oklch(0.900 0.006 240)"/>
    <text class="zoom-glyph" x="41" y="316">+</text>
    <text class="zoom-glyph" x="41" y="346">&#8722;</text>
    <text class="zoom-glyph" x="41" y="376">&#8635;</text>
  </g>

  <!-- links (drawn behind nodes) -->
  <g>
